# LibraryViewModelTest initializes WorkManager with synchronous executors and drives everything
# through the coroutine test scheduler. Robolectric's default PAUSED looper would leave
# WorkManager's internal main-looper callbacks unexecuted, so the enqueued ImportWorker never runs
# to completion and the test's firstImport.await() / uiState.first { error != null } hang. LEGACY
# looper mode runs main-thread runnables inline, matching the synchronous WorkManager test setup.
looperMode=LEGACY
